[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
# runner = "espflash --monitor" # Select this runner for espflash v1.x.x
runner = "espflash flash --monitor" # Select this runner for espflash v2.x.x
rustflags = [
  "--cfg",
  "espidf_time64",
] # Extending time_t for ESP IDF 5: https://github.com/esp-rs/rust/issues/110

[target.xtensa-esp32-espidf]
linker = "ldproxy"
# runner = "espflash --monitor" # Select this runner for espflash v1.x.x
runner = "espflash flash --monitor" # Select this runner for espflash v2.x.x
rustflags = [
  "--cfg",
  "espidf_time64",
] # Extending time_t for ESP IDF 5: https://github.com/esp-rs/rust/issues/110

[env]

DEP_LV_CONFIG_PATH = { value = "modules/graphics/include", relative = true }
LVGL_FONTS_DIR = { value = "modules/graphics/fonts_generator/generated_fonts", relative = true }

CFLAGS = "-Wno-error=int-conversion" # Fix for wasm-micro-runtime issue #4377

WAMR_BUILD_PLATFORM = "XILA"

WAMR_SHARED_PLATFORM_CONFIG = { value = "executables/wasm/bindings/wamr/shared_platform.cmake", relative = true }
LLVM_LIB_CFG_PATH = "/usr/lib/llvm-19/cmake/"
LITTLEFS_CONFIG = { value = "modules/little_fs/include/little_fs_config.h", relative = true }
INTERNATIONALIZATION_LOCALE = "en"
INTERNATIONALIZATION_FALLBACK = "en"

CMAKE_TOOLCHAIN_FILE_wasm32_unknown_unknown = { value = "wasm_toolchain.cmake", relative = true }

[build]
rustdocflags = ["--default-theme=ayu"]
